<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QKXPLW1VBY"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-QKXPLW1VBY');
  </script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2921978575809318"
          crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-2921978575809318">
  <title>Traffic Light Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
  <style>
    @font-face {
      font-family: 'PanopticMonospace';
      src: url('PanopticMonospace-Bold.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
  </style>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      background-color: #1b5e20;
      overflow: hidden;
      color: white;
    }

    @media (prefers-reduced-motion: no-preference) {
      body { transition: background-color 1s ease; }
    }

    /* Visually hidden but available to screen readers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #timer-display {
      font-size: 10vw; /* overridden by fitText() */
      font-family: 'PanopticMonospace', 'Courier New', monospace;
      line-height: 0.85;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      letter-spacing: -0.04em;
      user-select: none;
      white-space: nowrap;
      transform: scaleY(2);
      display: inline-block;
    }

    #timer-display .colon {
      display: inline-block;
      width: 1ch;
      transform: translateX(60%) translateY(-15%) scale(1.5) scaleY(0.75);
    }

    .controls-wrapper {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.25));
    }

    .duration-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1.4rem;
    }

    .duration-row input {
      width: 3.2rem;
      padding: 0.25rem 0.3rem;
      font-size: 1.4rem;
      font-family: inherit;
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      color: white;
      -moz-appearance: textfield;
      appearance: textfield;
      transition: border-color 0.2s, background 0.2s;
    }

    .duration-row input:focus {
      outline: 3px solid white;
      outline-offset: 2px;
      border-color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.25);
    }

    .duration-row input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .duration-row input::-webkit-inner-spin-button,
    .duration-row input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .duration-row .sep {
      font-size: 1.8rem;
      opacity: 0.7;
      line-height: 1;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      height: 3rem;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      transition: background 0.15s, transform 0.1s, opacity 0.2s, border-color 0.15s;
    }

    .btn span {
      display: block;
      line-height: 1;
    }

    .btn:focus-visible {
      outline: 3px solid white;
      outline-offset: 3px;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.32);
      border-color: rgba(255, 255, 255, 0.75);
      transform: scale(1.08);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.93);
    }

    .btn:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    #btn-pause {
      font-size: 1.4rem;
    }

    /* Start button is slightly larger — primary action */
    #btn-start {
      width: 3.8rem;
      height: 3.8rem;
      font-size: 1.5rem;
      background: rgba(255, 255, 255, 0.25);
    }

    /* Portrait mobile: stack minutes and seconds, hide colon */
    @media (orientation: portrait) and (max-width: 768px) {
      #timer-display {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: none;
        white-space: normal;
      }

      #timer-display .colon {
        display: none;
      }

      #timer-display .mins,
      #timer-display .secs {
        display: block;
      }
    }

    #page-content {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      text-align: center;
      pointer-events: none;
    }

    #page-content h1 {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: bold;
      letter-spacing: 0.05em;
      opacity: 0.85;
      margin-bottom: 0.35rem;
    }

    #page-content p {
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      opacity: 0.7;
      max-width: 55ch;
      margin: 0 auto;
      line-height: 1.5;
    }

    #ad-container {
      margin-bottom: 0.75rem;
    }

    /* Landscape mobile: controls move to the right of the timer */
    @media (orientation: landscape) and (max-height: 500px) {
      #ad-container,
      #page-content {
        display: none !important;
      }
      body {
        flex-direction: row;
        gap: 2rem;
        padding: 1rem 4rem;
      }

      .controls-wrapper {
        position: static;
        background: none;
        padding: 0;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Live region: announces phase changes to screen readers -->
  <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <header id="page-content">
    <h1>Traffic Light Timer</h1>
    <p>A full-screen countdown timer that changes colour as time runs out — green while you have plenty of time, amber for the last minute, and red when time is up. Perfect for meetings, presentations, classrooms and workshops.</p>
  </header>

  <div
    id="timer-display"
    role="timer"
    aria-live="off"
    aria-label="5 minutes remaining"
  >05:00</div>

  <div class="controls-wrapper" role="group" aria-label="Timer controls">
    <div id="ad-container">
      <!-- Traffic Light Timer Banner -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2921978575809318"
           data-ad-slot="4507519628"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>
    <div class="duration-row">
      <label for="min-input" class="sr-only">Minutes</label>
      <input id="min-input" type="number" min="0" max="99" value="5" aria-label="Minutes">
      <span class="sep" aria-hidden="true">:</span>
      <label for="sec-input" class="sr-only">Seconds</label>
      <input id="sec-input" type="number" min="0" max="59" value="00" aria-label="Seconds">
    </div>
    <div class="buttons">
      <button class="btn" id="btn-stop"  aria-label="Stop"><span aria-hidden="true">⏹</span></button>
      <button class="btn" id="btn-start" aria-label="Start"><span aria-hidden="true">▶</span></button>
      <button class="btn" id="btn-pause" aria-label="Pause" disabled><span aria-hidden="true">⏸</span></button>
    </div>
  </div>

  <script>
    const display      = document.getElementById('timer-display');
    const liveRegion   = document.getElementById('live-region');
    const minInput     = document.getElementById('min-input');
    const secInput     = document.getElementById('sec-input');
    const btnStop      = document.getElementById('btn-stop');
    const btnStart     = document.getElementById('btn-start');
    const btnPause     = document.getElementById('btn-pause');
    const adContainer  = document.getElementById('ad-container');
    const pageContent  = document.getElementById('page-content');
    let adInitialised  = false;

    const PHASE_COLORS = {
      green : '#1b5e20',
      amber : '#e65100',
      red   : '#b71c1c',
    };

    const PHASE_LABELS = {
      green : null, // no announcement when starting/resuming green phase
      amber : 'Less than one minute remaining',
      red   : 'Time is up',
    };

    let totalSeconds = 5 * 60;
    let remaining    = totalSeconds;
    let intervalId   = null;
    let runState     = 'stopped'; // 'stopped' | 'running' | 'paused'
    let lastPhase    = 'green';

    /* ── helpers ─────────────────────────────────────────── */

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatTime(secs) {
      if (secs < 0) {
        const abs = Math.abs(secs);
        return `+${pad(Math.floor(abs / 60))}:${pad(abs % 60)}`;
      }
      return `${pad(Math.floor(secs / 60))}:${pad(secs % 60)}`;
    }

    function spokenTime(secs) {
      if (secs < 0) {
        const abs = Math.abs(secs);
        const m = Math.floor(abs / 60);
        const s = abs % 60;
        const parts = [];
        if (m > 0) parts.push(`${m} minute${m !== 1 ? 's' : ''}`);
        if (s > 0) parts.push(`${s} second${s !== 1 ? 's' : ''}`);
        return `${parts.join(' and ')} over time`;
      }
      if (secs === 0) return 'Time is up';
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      const parts = [];
      if (m > 0) parts.push(`${m} minute${m !== 1 ? 's' : ''}`);
      if (s > 0) parts.push(`${s} second${s !== 1 ? 's' : ''}`);
      return `${parts.join(' and ')} remaining`;
    }

    function getPhase() {
      if (remaining <= 0)  return 'red';
      if (remaining <= 60) return 'amber';
      return 'green';
    }

    function getDuration() {
      const m = Math.max(0, Number.parseInt(minInput.value)  || 0);
      const s = Math.min(59, Math.max(0, Number.parseInt(secInput.value) || 0));
      return m * 60 + s;
    }

    /* ── UI updates ──────────────────────────────────────── */

    const landscapeQuery = window.matchMedia('(orientation: landscape) and (max-height: 500px)');
    const portraitQuery  = window.matchMedia('(orientation: portrait) and (max-width: 768px)');

    function fitText() {
      display.style.fontSize = '100px';
      const isPortrait = portraitQuery.matches;
      const availableWidth = landscapeQuery.matches
        ? window.innerWidth * 0.45
        : window.innerWidth * 0.75;
      const scaleW = availableWidth / display.scrollWidth;
      let scale = scaleW;
      if (isPortrait) {
        // Two stacked numbers — constrain by height too (60% of viewport)
        const scaleH = (window.innerHeight * 0.60) / display.scrollHeight;
        scale = Math.min(scaleW, scaleH);
      }
      display.style.fontSize = (100 * scale) + 'px';
    }

    let lastTextLength = -1;

    function announce(message) {
      liveRegion.textContent = '';
      // Timeout ensures the DOM change triggers a new announcement
      setTimeout(() => { liveRegion.textContent = message; }, 50);
    }

    function render() {
      const text  = formatTime(remaining);
      const phase = getPhase();

      const colonIdx = text.indexOf(':');
      const mins = text.slice(0, colonIdx);
      const secs = text.slice(colonIdx + 1);
      display.innerHTML = `<span class="mins">${mins}</span><span class="colon">:</span><span class="secs">${secs}</span>`;
      display.setAttribute('aria-label', spokenTime(remaining));
      document.body.style.backgroundColor = PHASE_COLORS[phase];

      if (text.length !== lastTextLength) {
        lastTextLength = text.length;
        fitText();
      }

      if (phase !== lastPhase) {
        lastPhase = phase;
        const msg = PHASE_LABELS[phase];
        if (msg) announce(msg);
      }
    }

    function syncButtons() {
      const running = runState === 'running';
      btnStart.disabled = running;
      btnPause.disabled = !running;
      const show = runState === 'stopped';
      adContainer.style.display = show ? 'block' : 'none';
      pageContent.style.display = show ? 'block' : 'none';
      if (show && !adInitialised) {
        adInitialised = true;
        requestAnimationFrame(() => {
          (window.adsbygoogle = window.adsbygoogle || []).push({});
        });
      }
      minInput.disabled = running;
      secInput.disabled = running;
    }

    /* ── timer logic ─────────────────────────────────────── */

    function tick() {
      remaining--;
      render();
    }

    function stop() {
      clearInterval(intervalId);
      intervalId   = null;
      runState     = 'stopped';
      totalSeconds = getDuration();
      remaining    = totalSeconds;
      lastPhase    = 'green';
      render();
      syncButtons();
      announce('Timer stopped');
    }

    function start() {
      if (runState === 'stopped') {
        totalSeconds = getDuration();
        remaining    = totalSeconds;
        if (remaining <= 0) return;
      }
      runState = 'running';
      clearInterval(intervalId);
      intervalId = setInterval(tick, 1000);
      render();
      syncButtons();
      announce('Timer started');
    }

    function pause() {
      if (runState !== 'running') return;
      clearInterval(intervalId);
      intervalId = null;
      runState   = 'paused';
      syncButtons();
      announce('Timer paused');
    }

    /* ── events ──────────────────────────────────────────── */

    btnStop.addEventListener('click', stop);
    btnStart.addEventListener('click', start);
    btnPause.addEventListener('click', pause);

    function onDurationChange() {
      if (runState !== 'stopped') return;
      secInput.value = Math.min(59, Math.max(0, Number.parseInt(secInput.value) || 0));
      totalSeconds   = getDuration();
      remaining      = totalSeconds;
      render();
    }

    minInput.addEventListener('change', onDurationChange);
    secInput.addEventListener('change', onDurationChange);

    window.addEventListener('resize', fitText);
    landscapeQuery.addEventListener('change', fitText);
    portraitQuery.addEventListener('change', fitText);
    document.fonts.ready.then(fitText);

    /* ── init ────────────────────────────────────────────── */

    render();
    syncButtons();
  </script>
</body>
</html>

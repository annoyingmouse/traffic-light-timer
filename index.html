<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QKXPLW1VBY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    // biome-ignore lint/complexity/noArguments: Google Analytics boilerplate
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-QKXPLW1VBY');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Light Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/1ec479c267.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Live region: announces phase changes to screen readers -->
  <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <header id="page-content">
    <h1>Traffic Light Timer</h1>
    <p>A full-screen countdown timer that changes colour as time runs out — green while you have plenty of time, amber for the last minute, and red when time is up. Perfect for meetings, presentations, classrooms and workshops.</p>
    <a class="kofi-btn" href="https://ko-fi.com/annoyingmouse25688" target="_blank" rel="noopener">
      <img src="https://storage.ko-fi.com/cdn/kofi_stroke_cup.svg" alt="" aria-hidden="true">
      Support me on Ko-fi
    </a>
  </header>

  <div
    id="timer-display"
    role="timer"
    aria-live="off"
    aria-label="5 minutes remaining"
  >05:00</div>

  <div class="controls-wrapper" role="group" aria-label="Timer controls">
    <div class="duration-row">
      <label for="min-input" class="sr-only">Minutes</label>
      <input id="min-input" type="number" min="0" max="99" value="5" aria-label="Minutes">
      <span class="sep" aria-hidden="true">:</span>
      <label for="sec-input" class="sr-only">Seconds</label>
      <input id="sec-input" type="number" min="0" max="59" value="00" aria-label="Seconds">
    </div>
    <div class="buttons">
      <button type="button" class="btn" id="btn-stop"  aria-label="Stop"><wa-icon name="stop" family="sharp" variant="solid"></wa-icon></button>
      <button type="button" class="btn" id="btn-start" aria-label="Start"><wa-icon name="play" family="sharp" variant="solid"></wa-icon></button>
      <button type="button" class="btn" id="btn-pause" aria-label="Pause" disabled><wa-icon name="pause" family="sharp" variant="solid"></wa-icon></button>
    </div>
  </div>

  <script type="module" src="bpm-glyph.js"></script>
  <script src="script.js"></script>
</body>
</html>
